server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties]

riot:
  api:
    key: ${RIOT_API_KEY}

springdoc:
  swagger-ui:
    path: /docs
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
  api-docs:
    path: /api-docs
  writer-with-default-pretty-printer: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized
